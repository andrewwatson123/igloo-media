<style>
  .ig * { box-sizing: border-box; margin: 0; padding: 0; }
  .ig {
    --ig-blue: #01a0f3;
    --ig-ink: #0a0e14;
    --ig-paper: #faf8f4;        /* warm magazine off-white */
    --ig-muted: #5b6470;
    --ig-line: #e6e9ee;
    --ig-radius: 16px;
    --ig-max: 1320px;
    font-family: 'Outfit', 'Manrope', system-ui, -apple-system, sans-serif;
    color: var(--ig-ink);
    background: var(--ig-paper);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .ig img { display: block; max-width: 100%; height: auto; }
  .ig__wrap { max-width: var(--ig-max); margin: 0 auto; padding: 0 32px; }

  /* ---------- Editorial header ---------- */
  .ig__header { padding: 120px 0 72px; }
  .ig__eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ig-ink); margin-bottom: 32px;
  }
  .ig__eyebrow::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--ig-blue);
  }
  .ig__page-title {
    font-family: 'Outfit', sans-serif;
    font-weight: 500;
    font-size: clamp(48px, 7vw, 110px);
    line-height: 0.96;
    letter-spacing: -0.035em;
    margin-bottom: 32px;
    max-width: 1100px;
  }
  .ig__page-title em {
    font-family: 'Crimson Pro', Georgia, serif;
    font-style: italic;
    font-weight: 400;
    color: var(--ig-blue);
  }
  .ig__intro {
    font-family: 'Crimson Pro', Georgia, serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(18px, 1.6vw, 22px);
    color: var(--ig-muted);
    max-width: 620px;
    line-height: 1.5;
  }

  /* ---------- Grid (magazine rhythm) ---------- */
  .ig__grid {
    padding: 32px 0 140px;
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 32px 24px;
  }
  .ig__card {
    position: relative;
    grid-column: span 12;
    background: var(--ig-ink);
    border-radius: var(--ig-radius);
    overflow: hidden;
    cursor: pointer;
    isolation: isolate;
    transition: transform 0.5s cubic-bezier(.2,.7,.2,1);
  }
  .ig__card--half { grid-column: span 6; }
  .ig__card:hover { transform: translateY(-4px); }
  .ig__card-image-wrap {
    position: absolute; inset: 0; overflow: hidden;
  }
  .ig__card-image {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.8s cubic-bezier(.2,.7,.2,1);
  }
  .ig__card:hover .ig__card-image { transform: scale(1.04); }
  .ig__card-image-wrap::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(10,14,20,0.05) 0%, rgba(10,14,20,0.55) 60%, rgba(10,14,20,0.85) 100%);
  }
  .ig__card-num {
    position: absolute; top: 32px; right: 40px;
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(80px, 10vw, 160px);
    line-height: 1;
    color: rgba(255,255,255,0.06);
    font-weight: 400;
    z-index: 1;
    pointer-events: none;
  }
  .ig__card-inner {
    position: relative; z-index: 2;
    padding: 56px 48px;
    color: #fff;
    min-height: 560px;
    display: flex; flex-direction: column; justify-content: flex-end;
  }
  .ig__card--half .ig__card-inner { min-height: 480px; padding: 40px 36px; }
  .ig__card-tags {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    margin-bottom: 24px;
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
  }
  .ig__card-tag-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--ig-blue);
  }
  .ig__card-tags span:not(.ig__card-tag-dot)::after {
    content: '·'; margin-left: 12px; opacity: 0.6;
  }
  .ig__card-tags span:not(.ig__card-tag-dot):last-child::after { content: ''; }
  .ig__card-title {
    font-family: 'Outfit', sans-serif;
    font-weight: 500;
    font-size: clamp(40px, 5vw, 72px);
    line-height: 1;
    letter-spacing: -0.025em;
    margin-bottom: 28px;
  }
  .ig__card--half .ig__card-title { font-size: clamp(32px, 3.4vw, 52px); }
  .ig__card-stats {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;
    padding: 20px 0; border-top: 1px solid rgba(255,255,255,0.18);
    margin-bottom: 28px;
  }
  .ig__card--half .ig__card-stats { grid-template-columns: repeat(2, 1fr); }
  .ig__card-stat-key {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 6px;
  }
  .ig__card-stat-val {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(22px, 2.2vw, 32px); font-weight: 400; line-height: 1;
    margin-bottom: 4px;
  }
  .ig__card-stat-lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }
  .ig__card-cta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
    color: #fff;
    display: inline-flex; align-items: center; gap: 14px;
    padding-top: 4px;
  }
  .ig__card-cta::before { content: '>'; opacity: 0.6; }
  .ig__card-cta-arrow {
    transition: transform 0.4s cubic-bezier(.2,.7,.2,1);
  }
  .ig__card:hover .ig__card-cta-arrow { transform: translateX(8px); }

  /* ---------- Drawer ---------- */
  .ig__backdrop {
    position: fixed; inset: 0;
    background: rgba(10,14,20,0.55);
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
    z-index: 90;
    backdrop-filter: blur(2px);
  }
  .ig__backdrop.is-open { opacity: 1; pointer-events: auto; }
  .ig__drawer {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: min(720px, 92vw);
    background: #fff;
    z-index: 100;
    transform: translateX(100%);
    transition: transform 0.5s cubic-bezier(.2,.7,.2,1);
    overflow-y: auto;
    overscroll-behavior: contain;
  }
  .ig__drawer.is-open { transform: translateX(0); }
  .ig__drawer-close {
    position: sticky; top: 20px; left: calc(100% - 60px); float: right;
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,0.95);
    border: 1px solid var(--ig-line);
    cursor: pointer; z-index: 5;
    display: grid; place-items: center;
    font-size: 18px; color: var(--ig-ink);
    margin: 20px 20px 0 0;
    transition: background 0.2s ease;
  }
  .ig__drawer-close:hover { background: var(--ig-ink); color: #fff; }
  .ig__drawer-hero {
    width: 100%; aspect-ratio: 16/10; object-fit: cover;
    margin-top: -60px;
  }
  .ig__drawer-body { padding: 40px 48px 60px; }
  .ig__drawer-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ig-muted);
    margin-bottom: 16px;
  }
  .ig__drawer-meta .dot { color: var(--ig-blue); margin: 0 6px; }
  .ig__drawer-title {
    font-family: 'Outfit', sans-serif;
    font-weight: 500;
    font-size: clamp(40px, 4.5vw, 60px);
    line-height: 1;
    letter-spacing: -0.025em;
    margin-bottom: 36px;
  }
  .ig__drawer-stats {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border: 1px solid var(--ig-blue);
    border-radius: 10px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .ig__drawer-stat {
    padding: 22px 18px;
    border-right: 1px solid rgba(1,160,243,0.18);
    background: rgba(1,160,243,0.04);
  }
  .ig__drawer-stat:last-child { border-right: 0; }
  .ig__drawer-stat-val {
    font-family: 'Outfit', sans-serif;
    font-weight: 500;
    font-size: clamp(22px, 2.2vw, 30px);
    color: var(--ig-blue); line-height: 1;
    margin-bottom: 8px;
  }
  .ig__drawer-stat-lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ig-muted);
  }
  .ig__drawer-includes {
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap;
    padding: 16px 18px;
    background: var(--ig-paper);
    border-radius: 10px;
    margin-bottom: 48px;
  }
  .ig__drawer-includes-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ig-muted);
    margin-right: 4px;
  }
  .ig__pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px; border-radius: 999px;
    background: #fff; border: 1px solid var(--ig-line);
    font-family: 'Manrope', sans-serif;
    font-size: 12px; font-weight: 500;
  }
  .ig__pill::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--ig-blue);
  }
  .ig__pill:nth-child(3n)::before { background: #f59e0b; }
  .ig__pill:nth-child(3n+1)::before { background: var(--ig-blue); }
  .ig__pill:nth-child(3n+2)::before { background: #6366f1; }
  .ig__drawer-section { margin-bottom: 36px; }
  .ig__drawer-section h3 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ig-muted);
    margin-bottom: 14px;
  }
  .ig__drawer-section p {
    font-family: 'Lato', sans-serif;
    font-size: 16px; line-height: 1.65;
    color: var(--ig-ink);
  }
  .ig__drawer-section p + p { margin-top: 12px; }
  .ig__drawer-services {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 48px;
  }
  .ig__chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    padding: 8px 14px;
    border: 1px solid var(--ig-line); border-radius: 4px;
    color: var(--ig-ink);
  }
  .ig__drawer-cta {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 18px 32px; border-radius: 999px;
    background: var(--ig-ink); color: #fff;
    text-decoration: none;
    font-family: 'Manrope', sans-serif;
    font-size: 14px; font-weight: 600; letter-spacing: 0.04em;
    transition: background 0.2s ease;
  }
  .ig__drawer-cta:hover { background: var(--ig-blue); }
  .ig__drawer-cta-arrow { font-family: 'JetBrains Mono', monospace; }

  body.ig-locked { overflow: hidden; }

  /* ---------- Responsive ---------- */
  @media (max-width: 900px) {
    .ig__wrap { padding: 0 20px; }
    .ig__header { padding: 80px 0 48px; }
    .ig__grid { padding: 16px 0 80px; gap: 20px; }
    .ig__card--half { grid-column: span 12; }
    .ig__card-inner { padding: 36px 24px; min-height: 460px; }
    .ig__card--half .ig__card-inner { padding: 32px 22px; min-height: 420px; }
    .ig__card-num { top: 20px; right: 24px; }
    .ig__card-stats { grid-template-columns: repeat(2, 1fr) !important; gap: 18px; }
    .ig__drawer-body { padding: 24px 24px 48px; }
    .ig__drawer-stats { grid-template-columns: repeat(2, 1fr) !important; }
    .ig__drawer-stat:nth-child(2) { border-right: 0; }
    .ig__drawer-stat:nth-child(1), .ig__drawer-stat:nth-child(2) {
      border-bottom: 1px solid rgba(1,160,243,0.18);
    }
  }
</style>

      cardStats: [
        { key: 'REV_YOY', val: '+167%', lbl: 'Revenue YoY' },
        { key: 'CAT_RNK', val: 'Top 10', lbl: 'Category Rank' },
        { key: 'CVR_LFT', val: '+52%',  lbl: 'CVR Lift' }
      ],
      drawerMeta: ['Baby & Toddler', 'Seller Central', 'Amazon US'],
      drawerStats: [
        { val: '+167%', lbl: 'Revenue YoY' },
        { val: 'Top 10', lbl: 'Category Rank' },
        { val: '+52%',  lbl: 'CVR Lift' }
      ],
      includes: ['Amazon PPC', 'Listing Optimization', 'Brand Store'],
      challenge: 'Emerging baby and toddler brand entering a competitive category with established players and limited review history. Cold-start dynamics meant CPCs were high, conversion was unproven, and the catalog needed to earn trust before it could earn rank.',
      approach: 'Full listing overhaul with lifestyle imagery and A+ Premium content positioning the weighted plush as a calming-aid product, not a toy. Structured PPC launch with category and competitor targeting tiered by intent — auto-discovery → manual refinement → defensive — and a dedicated Brand Store that converted browse into multi-unit sessions.',
      result: 'Revenue grew 167% year-over-year. The flagship SKU reached Top 10 in its category within 4 months of activation. Conversion rate lifted 52% post-listing rebuild. Review velocity tripled, compounding rank gains and reducing CPC dependency over the second half of the engagement.',
      services: ['Listing Optimisation', 'A+ Premium', 'PPC Launch', 'Creative Testing', 'Brand Store']
    }
  ];

  // ============================================================
  // RENDER GRID
  // ============================================================
  const grid = document.getElementById('ig-grid');
  grid.innerHTML = CASE_STUDIES.map((c, i) => `
    <article class="ig__card ig__card--${c.layout}" data-case="${c.id}" tabindex="0" role="button" aria-label="View ${c.name} case study">
      <div class="ig__card-image-wrap">
        <img class="ig__card-image" src="${c.heroImage}" alt="${c.name}" loading="lazy" />
      </div>
      <div class="ig__card-num">${String(i + 1).padStart(2, '0')}</div>
      <div class="ig__card-inner">
        <div class="ig__card-tags">
          <span class="ig__card-tag-dot"></span>
          ${c.tags.map(t => `<span>${t}</span>`).join('')}
        </div>
        <h2 class="ig__card-title">${c.name}</h2>
        <div class="ig__card-stats" style="grid-template-columns: repeat(${c.cardStats.length}, 1fr);">
          ${c.cardStats.map(s => `
            <div>
              <div class="ig__card-stat-key">${s.key}</div>
              <div class="ig__card-stat-val">${s.val}</div>
              <div class="ig__card-stat-lbl">${s.lbl}</div>
            </div>
          `).join('')}
        </div>
        <div class="ig__card-cta">
          View Case
          <span class="ig__card-cta-arrow">—&nbsp;&rarr;</span>
        </div>
      </div>
    </article>
  `).join('');

  // ============================================================
  // DRAWER
  // ============================================================
  const drawer = document.getElementById('ig-drawer');
  const backdrop = document.getElementById('ig-backdrop');
  const closeBtn = document.getElementById('ig-drawer-close');
  const content = document.getElementById('ig-drawer-content');

  function renderDrawer(c) {
    content.innerHTML = `
      <img class="ig__drawer-hero" src="${c.heroImage}" alt="${c.name}" />
      <div class="ig__drawer-body">
        <div class="ig__drawer-meta">${c.drawerMeta.map((m, i) => i === 0 ? m : `<span class="dot">·</span>${m}`).join('')}</div>
        <h2 class="ig__drawer-title">${c.name}</h2>
        <div class="ig__drawer-stats" style="grid-template-columns: repeat(${c.drawerStats.length}, 1fr);">
          ${c.drawerStats.map(s => `
            <div class="ig__drawer-stat">
              <div class="ig__drawer-stat-val">${s.val}</div>
              <div class="ig__drawer-stat-lbl">${s.lbl}</div>
            </div>
          `).join('')}
        </div>
        <div class="ig__drawer-includes">
          <span class="ig__drawer-includes-label">Includes</span>
          ${c.includes.map(i => `<span class="ig__pill">${i}</span>`).join('')}
        </div>
        <div class="ig__drawer-section">
          <h3>The Challenge</h3>
          <p>${c.challenge}</p>
        </div>
        <div class="ig__drawer-section">
          <h3>Our Approach</h3>
          <p>${c.approach}</p>
        </div>
        <div class="ig__drawer-section">
          <h3>The Result</h3>
          <p>${c.result}</p>
        </div>
        <div class="ig__drawer-section">
          <h3>Services Deployed</h3>
          <div class="ig__drawer-services">
            ${c.services.map(s => `<span class="ig__chip">${s}</span>`).join('')}
          </div>
        </div>
        <a class="ig__drawer-cta" href="#contact">
          Start your workshop
          <span class="ig__drawer-cta-arrow">→</span>
        </a>
      </div>
    `;
    drawer.scrollTop = 0;
  }

  function openDrawer(id) {
    const c = CASE_STUDIES.find(x => x.id === id);
    if (!c) return;
    renderDrawer(c);
    drawer.classList.add('is-open');
    backdrop.classList.add('is-open');
    drawer.setAttribute('aria-hidden', 'false');
    document.body.classList.add('ig-locked');
  }
  function closeDrawer() {
    drawer.classList.remove('is-open');
    backdrop.classList.remove('is-open');
    drawer.setAttribute('aria-hidden', 'true');
    document.body.classList.remove('ig-locked');
  }

  document.querySelectorAll('.ig__card').forEach(card => {
    card.addEventListener('click', () => openDrawer(card.dataset.case));
    card.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openDrawer(card.dataset.case); }
    });
  });
  backdrop.addEventListener('click', closeDrawer);
  closeBtn.addEventListener('click', closeDrawer);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });
})();
</script>

</body>
</html>
